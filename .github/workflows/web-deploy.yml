name: Build & Deploy Web

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main

jobs:
  build-web:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    env:
      NODE_OPTIONS: --max-old-space-size=4096

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.0
          cache: "yarn"

      - name: Enable Corepack (Yarn)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile --ignore-scripts

      - name: Type-check web bundle
        run: yarn typecheck:web

      - name: Build web SPA
        run: vite build --config vite.web.config.ts
        env:
          RENDERER_VITE_EXTERNAL_RESOURCES_URL: ${{ vars.EXTERNAL_RESOURCES_URL }}
          RENDERER_VITE_SENTRY_DSN: ${{ vars.SENTRY_DSN }}

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@3 pages deploy out/web \
            --project-name="vapor-web" \
            --branch "${{ github.ref_name }}" \
            --commit-dirty
